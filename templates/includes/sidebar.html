  <div id="characterHeader" class="d-flex align-items-center justify-content-between p-3 border-bottom bg-white">
    <div class="d-flex align-items-center">
      <img id="characterAvatar" src="" alt="Character Avatar" class="character-header-avatar me-3">
      <div class="character-info">
        <div id="characterName" class="character-header-name"></div>
        <div id="characterSignature" class="character-signature" style="font-size: 0.8rem; color: #6c757d; font-style: italic; margin-top: 2px;"></div>
      </div>
    </div>
  </div>

  
  <div id="writerFileBrowserArea" class="p-3">
      <button id="btnUsageGuide" class="btn btn-sm w-100 mb-2 pink-text-button">
        {{if eq .Language "en"}}Project Introduction (Must-read for writers){{else}}项目介绍（写手必读）{{end}}
      </button>
    <h4 class="mb-3" data-translate="writer_scenarios">{{if eq .Language "en"}}Writing List{{else}}写作列表{{end}}</h4>


    <!-- Category Filter -->
    <div id="categoryFilterArea" class="mb-3">
      <select id="categorySelect" class="form-select form-select-sm">
        <option value="" data-translate="all_status">{{if eq .Language "en"}}🔄 Show All{{else}}🔄 显示全部{{end}}</option>
        <option value="passed" data-translate="passed">{{if eq .Language "en"}}✅ OK!{{else}}✅ OK！{{end}}</option>
        <option value="pending" data-translate="pending">{{if eq .Language "en"}}⏳ Pending{{else}}⏳ 待审核{{end}}</option>
        <option value="rejected" data-translate="rejected">{{if eq .Language "en"}}🔧 Improve{{else}}🔧 待改进{{end}}</option>
        <option value="in_works" data-translate="in_works">{{if eq .Language "en"}}🔨 In Works{{else}}🔨 进行中{{end}}</option>
      </select>
    </div>

    <div id="writerFileBrowser" class="writer-file-browser" style="max-height: 400px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 6px; padding: 0.5rem;"></div>
    
    <!-- Character Management Buttons (outside scroll area) -->
    <div id="characterManagementButtons" class="mt-3"></div>
    
    <!-- Compact Legacy toggle (bottom-left) -->
    <div id="legacyButtonWrapper" class="position-relative mt-2">
      <button id="legacyToggleButton" class="btn btn-sm btn-outline-secondary" style="width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center;" title="Legacy">
        🗃️
      </button>
      <div id="legacyMenu" class="card shadow-sm" style="position: absolute; bottom: 42px; left: 0; width: 170px; display: none; z-index: 20;">
        <div class="list-group list-group-flush">
          <button id="btnCategoryLegacyPassed" class="list-group-item list-group-item-action category-filter-btn" data-category="legacy_passed" data-translate="legacy_passed" style="font-size: 0.85rem; padding: 0.4rem 0.75rem;">
            📚 Legacy Passed
          </button>
          <button id="btnCategoryLegacyRejected" class="list-group-item list-group-item-action category-filter-btn" data-category="legacy_rejected" data-translate="legacy_rejected" style="font-size: 0.85rem; padding: 0.4rem 0.75rem;">
            🗃️ Legacy Failed
          </button>
        </div>
      </div>
    </div>

    <!-- Compact login shortcut -->
    <div id="quickLoginWrapper" class="d-flex align-items-center gap-2 mt-3" style="min-height: 36px;">
      <img src="/static/user/simple-user-default-icon-free-png.png" alt="Avatar" style="width: 28px; height: 28px; border-radius: 6px; object-fit: cover;">
      <!-- Login button (shown when not logged in) -->
      <a href="/login/e" id="quickLoginBtn" class="btn btn-sm btn-outline-primary" style="padding: 0.25rem 0.5rem; display: none;">
        {{if eq .Language "en"}}Login{{else}}登录{{end}}
      </a>
      <!-- User info (shown when logged in) -->
      <div id="quickUserInfo" style="display: none; flex-direction: column; gap: 2px;">
        <span id="quickUsername" style="font-size: 0.85rem; font-weight: 500;"></span>
        <a href="#" id="quickLogoutLink" onclick="handleLogout(event)" style="font-size: 0.75rem; color: var(--text-muted); text-decoration: none;">
          {{if eq .Language "en"}}Logout{{else}}退出{{end}}
        </a>
      </div>
    </div>
    
    <script>
    // Handle logout with return to current page
    function handleLogout(event) {
      event.preventDefault();
      const currentPath = window.location.pathname;
      window.location.href = '/logout?return_to=' + encodeURIComponent(currentPath);
    }
    
    // Check authentication status and update sidebar
    (function() {
      fetch('/api/current_user')
        .then(response => response.json())
        .then(data => {
          const loginBtn = document.getElementById('quickLoginBtn');
          const userInfo = document.getElementById('quickUserInfo');
          const username = document.getElementById('quickUsername');
          
          if (data.logged_in && data.username) {
            // User is logged in
            loginBtn.style.display = 'none';
            userInfo.style.display = 'flex';
            username.textContent = data.username;
          } else {
            // User is not logged in
            loginBtn.style.display = 'block';
            userInfo.style.display = 'none';
          }
        })
        .catch(err => {
          console.error('Failed to check auth status:', err);
          // Show login button by default on error
          document.getElementById('quickLoginBtn').style.display = 'block';
        });
    })();
    </script>
  </div>
