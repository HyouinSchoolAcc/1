<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Language - 选择语言</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
        }

        h1 {
            font-size: 32px;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #718096;
            margin-bottom: 40px;
        }

        .language-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .lang-btn {
            display: block;
            padding: 20px 30px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            color: #2d3748;
            text-decoration: none;
            font-size: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .lang-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .lang-btn .flag {
            font-size: 32px;
            margin-right: 15px;
            vertical-align: middle;
        }

        .lang-btn .text {
            vertical-align: middle;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #a0aec0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 16px;
            }

            .lang-btn {
                padding: 18px 25px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">奇</div>
        <h1>Welcome · 欢迎</h1>
        <p class="subtitle">Select your language · 选择您的语言</p>
        
        <div class="language-buttons">
            <a href="/e" class="lang-btn">
                <span class="flag">🇺🇸</span>
                <span class="text">English</span>
            </a>
            <a href="/" class="lang-btn">
                <span class="flag">🇨🇳</span>
                <span class="text">中文</span>
            </a>
        </div>

        <div class="footer">
            World Line 2 Studio · 奇点之门工作室
        </div>
    </div>
</body>
</html>
