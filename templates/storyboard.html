<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyboard Editor - Writer Portal</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-hover: #252542;
            --bg-input: #12121f;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --text-muted: #6b7280;
            --accent-primary: #818cf8;
            --accent-secondary: #6366f1;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --border-color: #2d3748;
            --border-focus: #818cf8;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        
        /* Top toolbar */
        .top-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            z-index: 1000;
        }
        
        .toolbar-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .toolbar-divider {
            width: 1px;
            height: 30px;
            background: var(--border-color);
            margin: 0 0.5rem;
        }
        
        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .toolbar-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .toolbar-select {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 150px;
        }
        
        .toolbar-select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .lang-toggle {
            display: flex;
            background: var(--bg-input);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .lang-toggle button {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .lang-toggle button.active {
            background: var(--accent-primary);
            color: white;
        }
        
        .lang-toggle button:hover:not(.active) {
            background: var(--bg-hover);
        }
        
        .toolbar-spacer { flex: 1; }
        
        .toolbar-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        
        .toolbar-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-primary);
        }
        
        .toolbar-btn.primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        
        .toolbar-btn.primary:hover {
            background: var(--accent-secondary);
        }
        
        .toolbar-btn.success {
            background: var(--accent-success);
            border-color: var(--accent-success);
        }
        
        /* Main layout */
        .main-container {
            display: flex;
            margin-top: 60px;
            height: calc(100vh - 60px);
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .sidebar-section {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .user-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .user-item {
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .user-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .user-item.active {
            background: var(--accent-primary);
            color: white;
        }
        
        .user-item .user-days {
            margin-left: auto;
            font-size: 0.75rem;
            background: var(--bg-input);
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
        }
        
        .user-item.active .user-days {
            background: rgba(255,255,255,0.2);
        }
        
        /* Content area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        /* Character profile section */
        .profile-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .profile-tagline {
            color: var(--text-secondary);
            font-style: italic;
        }
        
        /* Day cards grid */
        .days-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .days-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }
        
        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }
        
        .day-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .day-card:hover {
            border-color: var(--accent-primary);
        }
        
        .day-card-header {
            background: var(--bg-hover);
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        
        .day-card-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .day-status {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            text-transform: uppercase;
        }
        
        .day-status.passed { background: var(--accent-success); color: white; }
        .day-status.pending { background: var(--accent-warning); color: black; }
        .day-status.rejected { background: var(--accent-danger); color: white; }
        
        .day-card-body {
            padding: 1rem;
        }
        
        .schedule-section {
            margin-bottom: 1rem;
        }
        
        .schedule-label {
            font-size: 0.8rem;
            color: var(--accent-primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .schedule-grid {
            display: grid;
            gap: 0.5rem;
        }
        
        .schedule-row {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 0.5rem;
            align-items: start;
        }
        
        .schedule-period {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding-top: 0.4rem;
        }
        
        .schedule-input {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            width: 100%;
            resize: vertical;
            min-height: 32px;
            font-family: inherit;
        }
        
        .schedule-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .schedule-input.modified {
            border-color: var(--accent-warning);
            background: rgba(245, 158, 11, 0.1);
        }
        
        .day-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            padding-top: 0.5rem;
            border-top: 1px solid var(--border-color);
            margin-top: 0.5rem;
        }
        
        .day-meta span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        /* Relationship/History section */
        .context-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        
        .context-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        
        .context-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-input);
            padding: 0.5rem;
            border-radius: 4px;
            max-height: 80px;
            overflow-y: auto;
        }
        
        /* Save indicator */
        .save-indicator {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-success);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        
        .save-indicator.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .save-indicator.error {
            background: var(--accent-danger);
        }
        
        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-secondary);
        }
        
        .loading i {
            margin-right: 0.5rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        /* Unsaved changes indicator */
        .has-changes .toolbar-title::after {
            content: "•";
            color: var(--accent-warning);
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Top Toolbar -->
    <div class="top-toolbar" id="toolbar">
        <div class="toolbar-title">
            <i class="fas fa-book-open"></i>
            <span>Storyboard Editor</span>
        </div>
        
        <div class="toolbar-divider"></div>
        
        <div class="toolbar-group">
            <span class="toolbar-label">Character:</span>
            <select class="toolbar-select" id="characterSelect">
                <option value="">Loading...</option>
            </select>
        </div>
        
        <div class="toolbar-divider"></div>
        
        <div class="toolbar-group">
            <span class="toolbar-label">Language:</span>
            <div class="lang-toggle">
                <button id="langEN" class="active">EN</button>
                <button id="langCN">中文</button>
            </div>
        </div>
        
        <div class="toolbar-spacer"></div>
        
        <button class="toolbar-btn" id="regenerateBtn">
            <i class="fas fa-sync-alt"></i> Regenerate
        </button>
        
        <button class="toolbar-btn success" id="saveAllBtn" style="display: none;">
            <i class="fas fa-save"></i> Save All Changes
        </button>
    </div>
    
    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">User Scenarios</div>
                <ul class="user-list" id="userList">
                    <!-- Populated dynamically -->
                </ul>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-section-title">Quick Links</div>
                <ul class="user-list">
                    <li class="user-item" onclick="location.href='/descriptions'">
                        <i class="fas fa-id-card"></i> Character Profiles
                    </li>
                    <li class="user-item" onclick="location.href='/navigation'">
                        <i class="fas fa-pen"></i> Writing Editor
                    </li>
                </ul>
            </div>
        </aside>
        
        <!-- Content Area -->
        <main class="content-area" id="contentArea">
            <div class="loading">
                <i class="fas fa-spinner"></i> Loading storyboard...
            </div>
        </main>
    </div>
    
    <!-- Save Indicator -->
    <div class="save-indicator" id="saveIndicator">
        <i class="fas fa-check"></i>
        <span>Saved successfully</span>
    </div>
    
    <script>
        // State
        let storyboardData = null;
        let currentCharacter = null;
        let currentUser = null;
        let currentLang = 'en'; // 'en' or 'cn'
        let pendingChanges = {}; // {filepath: {field: value}}
        
        // DOM elements
        const characterSelect = document.getElementById('characterSelect');
        const userList = document.getElementById('userList');
        const contentArea = document.getElementById('contentArea');
        const saveAllBtn = document.getElementById('saveAllBtn');
        const saveIndicator = document.getElementById('saveIndicator');
        const toolbar = document.getElementById('toolbar');
        
        // Load storyboard data
        async function loadStoryboard() {
            try {
                const response = await fetch('/static/storyboard.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load storyboard');
                storyboardData = await response.json();
                
                // Populate character select
                characterSelect.innerHTML = '';
                storyboardData.characters.forEach(char => {
                    const opt = document.createElement('option');
                    opt.value = char.id;
                    opt.textContent = currentLang === 'en' ? char.name_en : char.name;
                    characterSelect.appendChild(opt);
                });
                
                // Select first character
                if (storyboardData.characters.length > 0) {
                    selectCharacter(storyboardData.characters[0].id);
                }
            } catch (error) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error Loading Storyboard</h3>
                        <p>${error.message}</p>
                        <p>Run <code>python export_storyboard.py</code> to generate the data.</p>
                    </div>
                `;
            }
        }
        
        // Select a character
        function selectCharacter(charId) {
            currentCharacter = storyboardData.characters.find(c => c.id === charId);
            characterSelect.value = charId;
            
            if (!currentCharacter) return;
            
            // Populate user list
            userList.innerHTML = '';
            currentCharacter.users.forEach(user => {
                const li = document.createElement('li');
                li.className = 'user-item';
                li.innerHTML = `
                    <i class="fas fa-user"></i>
                    <span>${currentLang === 'en' ? user.name_en : user.name}</span>
                    <span class="user-days">${user.days.length} days</span>
                `;
                li.onclick = () => selectUser(user.id);
                userList.appendChild(li);
            });
            
            // Select first user
            if (currentCharacter.users.length > 0) {
                selectUser(currentCharacter.users[0].id);
            } else {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <h3>No User Scenarios</h3>
                        <p>No user scenarios found for this character.</p>
                    </div>
                `;
            }
        }
        
        // Select a user
        function selectUser(userId) {
            currentUser = currentCharacter.users.find(u => u.id === userId);
            
            // Update sidebar selection
            document.querySelectorAll('.user-item').forEach((item, i) => {
                item.classList.toggle('active', currentCharacter.users[i]?.id === userId);
            });
            
            renderDays();
        }
        
        // Render days for current user
        function renderDays() {
            if (!currentUser) return;
            
            const langSuffix = currentLang === 'cn' ? '_cn' : '';
            const userName = currentLang === 'en' ? currentUser.name_en : currentUser.name;
            const charName = currentLang === 'en' ? currentCharacter.name_en : currentCharacter.name;
            
            let html = `
                <div class="days-header">
                    <h2><i class="fas fa-calendar-alt"></i> ${userName}'s Story with ${charName}</h2>
                </div>
                <div class="days-grid">
            `;
            
            currentUser.days.forEach(day => {
                const status = day.category.includes('passed') ? 'passed' : 
                              day.category.includes('rejected') ? 'rejected' : 'pending';
                
                html += `
                    <div class="day-card" data-filepath="${day.filepath}">
                        <div class="day-card-header">
                            <div class="day-card-title">
                                <i class="fas fa-sun"></i> Day ${day.day}
                            </div>
                            <span class="day-status ${status}">${status}</span>
                        </div>
                        <div class="day-card-body">
                            <!-- Character Schedule -->
                            <div class="schedule-section">
                                <div class="schedule-label">
                                    <i class="fas fa-user-circle"></i> ${charName}'s Schedule
                                </div>
                                <div class="schedule-grid">
                                    ${renderScheduleRow('Morning', 'character_schedule', 'morning', day, langSuffix)}
                                    ${renderScheduleRow('Noon', 'character_schedule', 'noon', day, langSuffix)}
                                    ${renderScheduleRow('Afternoon', 'character_schedule', 'afternoon', day, langSuffix)}
                                    ${renderScheduleRow('Evening', 'character_schedule', 'evening', day, langSuffix)}
                                    ${renderScheduleRow('Night', 'character_schedule', 'night', day, langSuffix)}
                                </div>
                            </div>
                            
                            <!-- User Schedule -->
                            <div class="schedule-section">
                                <div class="schedule-label">
                                    <i class="fas fa-user"></i> ${userName}'s Schedule
                                </div>
                                <div class="schedule-grid">
                                    ${renderScheduleRow('Morning', 'user_schedule', 'morning', day, langSuffix)}
                                    ${renderScheduleRow('Noon', 'user_schedule', 'noon', day, langSuffix)}
                                    ${renderScheduleRow('Afternoon', 'user_schedule', 'afternoon', day, langSuffix)}
                                    ${renderScheduleRow('Evening', 'user_schedule', 'evening', day, langSuffix)}
                                    ${renderScheduleRow('Night', 'user_schedule', 'night', day, langSuffix)}
                                </div>
                            </div>
                            
                            <!-- Meta info -->
                            <div class="day-meta">
                                <span><i class="fas fa-comments"></i> ${day.dialogue_count} messages</span>
                                <span><i class="fas fa-heart"></i> ${day.intimacy.toFixed(2)}</span>
                            </div>
                            
                            <!-- Relationship context -->
                            ${day.relationship ? `
                            <div class="context-section">
                                <div class="context-label">Relationship Stage</div>
                                <div class="context-text">${day.relationship}</div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            contentArea.innerHTML = html;
            
            // Attach change listeners
            contentArea.querySelectorAll('.schedule-input').forEach(input => {
                input.addEventListener('input', handleScheduleChange);
            });
        }
        
        // Render a schedule row
        function renderScheduleRow(label, scheduleType, period, day, langSuffix) {
            const schedule = day[scheduleType];
            const fieldKey = period + langSuffix;
            const value = schedule[fieldKey] || schedule[period] || '';
            const dataKey = `${scheduleType}.${period}`;
            
            return `
                <div class="schedule-row">
                    <span class="schedule-period">${label}</span>
                    <textarea class="schedule-input" 
                        data-filepath="${day.filepath}"
                        data-schedule-type="${scheduleType}"
                        data-period="${period}"
                        rows="1"
                    >${escapeHtml(value)}</textarea>
                </div>
            `;
        }
        
        // Handle schedule input change
        function handleScheduleChange(e) {
            const input = e.target;
            const filepath = input.dataset.filepath;
            const scheduleType = input.dataset.scheduleType;
            const period = input.dataset.period;
            const value = input.value;
            
            // Track the change
            if (!pendingChanges[filepath]) {
                pendingChanges[filepath] = {};
            }
            if (!pendingChanges[filepath][scheduleType]) {
                pendingChanges[filepath][scheduleType] = {};
            }
            pendingChanges[filepath][scheduleType][period] = value;
            
            // Mark as modified
            input.classList.add('modified');
            
            // Show save button
            updateSaveButton();
        }
        
        // Update save button visibility
        function updateSaveButton() {
            const hasChanges = Object.keys(pendingChanges).length > 0;
            saveAllBtn.style.display = hasChanges ? 'flex' : 'none';
            toolbar.classList.toggle('has-changes', hasChanges);
        }
        
        // Save all pending changes
        async function saveAllChanges() {
            const btn = saveAllBtn;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            let successCount = 0;
            let errorCount = 0;
            
            for (const [filepath, changes] of Object.entries(pendingChanges)) {
                try {
                    // Extract filename and preset from filepath
                    const parts = filepath.split('/');
                    const filename = parts.pop();
                    const preset = parts.pop();
                    
                    for (const [scheduleType, periods] of Object.entries(changes)) {
                        const response = await fetch('/update_schedule', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                preset: preset,
                                filename: filename,
                                schedule_type: scheduleType,
                                schedule_data: periods
                            })
                        });
                        
                        if (response.ok) {
                            successCount++;
                        } else {
                            errorCount++;
                        }
                    }
                } catch (error) {
                    console.error('Save error:', error);
                    errorCount++;
                }
            }
            
            // Clear pending changes
            pendingChanges = {};
            updateSaveButton();
            
            // Remove modified class from inputs
            document.querySelectorAll('.schedule-input.modified').forEach(input => {
                input.classList.remove('modified');
            });
            
            // Show indicator
            showSaveIndicator(errorCount === 0, 
                errorCount === 0 
                    ? `Saved ${successCount} changes` 
                    : `${errorCount} errors, ${successCount} saved`
            );
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Save All Changes';
        }
        
        // Show save indicator
        function showSaveIndicator(success, message) {
            saveIndicator.className = 'save-indicator show' + (success ? '' : ' error');
            saveIndicator.querySelector('span').textContent = message;
            saveIndicator.querySelector('i').className = success ? 'fas fa-check' : 'fas fa-exclamation-triangle';
            
            setTimeout(() => {
                saveIndicator.classList.remove('show');
            }, 3000);
        }
        
        // Regenerate storyboard
        async function regenerateStoryboard() {
            const btn = document.getElementById('regenerateBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
            
            try {
                const response = await fetch('/api/storyboard/regenerate', { method: 'POST' });
                if (!response.ok) throw new Error('Failed to regenerate');
                
                await loadStoryboard();
                showSaveIndicator(true, 'Storyboard regenerated');
            } catch (error) {
                showSaveIndicator(false, 'Regeneration failed: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Regenerate';
            }
        }
        
        // Toggle language
        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('langEN').classList.toggle('active', lang === 'en');
            document.getElementById('langCN').classList.toggle('active', lang === 'cn');
            
            // Re-render with new language
            if (currentCharacter) {
                selectCharacter(currentCharacter.id);
            }
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
        
        // Event listeners
        characterSelect.addEventListener('change', e => selectCharacter(e.target.value));
        document.getElementById('langEN').addEventListener('click', () => setLanguage('en'));
        document.getElementById('langCN').addEventListener('click', () => setLanguage('cn'));
        document.getElementById('regenerateBtn').addEventListener('click', regenerateStoryboard);
        saveAllBtn.addEventListener('click', saveAllChanges);
        
        // Initial load
        loadStoryboard();
    </script>
<script src="/static/js/impersonation.js"></script>
</body>
</html>
